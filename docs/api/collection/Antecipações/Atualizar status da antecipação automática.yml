info:
  name: Atualizar status da antecipação automática
  type: http
  seq: 5
  tags:
    - Antecipações

http:
  method: PUT
  url: "{{baseUrl}}/v3/anticipations/configurations"
  body:
    type: json
    data: |-
      {
        "creditCardAutomaticEnabled": null
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/anticipations/configurations"
      method: PUT
      body:
        type: json
        data: |-
          {
            "creditCardAutomaticEnabled": null
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "creditCardAutomaticEnabled": false
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/anticipations/configurations"
      method: PUT
      body:
        type: json
        data: |-
          {
            "creditCardAutomaticEnabled": null
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/anticipations/configurations"
      method: PUT
      body:
        type: json
        data: |-
          {
            "creditCardAutomaticEnabled": null
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
