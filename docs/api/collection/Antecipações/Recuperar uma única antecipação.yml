        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/anticipations/:id"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da antecipação no Asaas
    response:
      status: 401
      statusText: Unauthorized
      headers:
