info:
  name: Recuperar uma única antecipação
  type: http
  seq: 4
  tags:
    - Antecipações

http:
  method: GET
  url: "{{baseUrl}}/v3/anticipations/:id"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da antecipação no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/anticipations/:id"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da antecipação no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "receivableAnticipation",
            "id": "9e7d8639-350f-45c0-8bc3-d4ddc5f4ebac",
            "installment": null,
            "payment": "pay_626366773834",
            "status": "PENDING",
            "anticipationDate": "2019-05-20",
            "dueDate": "2019-05-26",
            "requestDate": "2019-05-14",
            "fee": 2.33,
            "anticipationDays": 5,
            "netValue": 73.68,
            "totalValue": 80,
            "value": 76.01,
            "denialObservation": null
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/anticipations/:id"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da antecipação no Asaas
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
