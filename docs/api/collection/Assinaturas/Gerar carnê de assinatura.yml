info:
  name: Gerar carnê de assinatura
  type: http
  seq: 9
  tags:
    - Assinaturas

http:
  method: GET
  url: "{{baseUrl}}/v3/subscriptions/:id/paymentBook"
  params:
    - name: id
      value: sub_VXJBYgP2u0eO
      type: path
      description: Identificador único da assinatura no Asaas
    - name: month
      value: "null"
      type: query
      description: Mês final para geração do carnê
    - name: year
      value: "null"
      type: query
      description: Ano final para geração do carnê
    - name: sort
      value: "null"
      type: query
      description: Filtrar pelo nome da coluna
    - name: order
      value: asc
      type: query
      description: Ordenação da coluna
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/subscriptions/:id/paymentBook"
      method: GET
      params:
        - name: id
          value: sub_VXJBYgP2u0eO
          type: path
          description: Identificador único da assinatura no Asaas
        - name: month
          value: "null"
          type: query
          description: Mês final para geração do carnê
        - name: year
          value: "null"
          type: query
          description: Ano final para geração do carnê
        - name: sort
          value: "null"
          type: query
          description: Filtrar pelo nome da coluna
        - name: order
          value: asc
          type: query
          description: Ordenação da coluna
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/pdf
      body:
        type: text
        data: Binário do carnê da assinatura
