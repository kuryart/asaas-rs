      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: customer
      value: "null"
      type: query
      description: Filtrar pelo Identificador único do cliente
    - name: customerGroupName
      value: "null"
      type: query
      description: Filtrar pelo nome do grupo de cliente
    - name: billingType
      value: UNDEFINED
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: billingType
      value: BOLETO
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: billingType
      value: CREDIT_CARD
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: billingType
      value: DEBIT_CARD
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: billingType
      value: TRANSFER
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: billingType
      value: DEPOSIT
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: billingType
      value: PIX
      type: query
      description: Filtrar por forma de pagamento
      disabled: true
    - name: status
      value: ACTIVE
      type: query
      description: Filtrar pelo status
      disabled: true
    - name: status
      value: EXPIRED
      type: query
      description: Filtrar pelo status
      disabled: true
    - name: status
      value: INACTIVE
      type: query
      description: Filtrar pelo status
      disabled: true
    - name: deletedOnly
      value: "null"
      type: query
      description: Envie true para retornar somente as assinaturas removidas
    - name: includeDeleted
      value: "null"
      type: query
      description: Envie true para recuperar também as assinaturas removidas
    - name: externalReference
      value: "null"
      type: query
      description: Filtrar pelo Identificador do seu sistema
    - name: order
      value: "null"
      type: query
      description: Ordem crescente ou decrescente
    - name: sort
      value: "null"
      type: query
      description: Por qual campo será ordenado
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

