info:
  name: Recuperar configuração para emissão de notas fiscais
  type: http
  seq: 11
  tags:
    - Assinaturas

http:
  method: GET
  url: "{{baseUrl}}/v3/subscriptions/:id/invoiceSettings"
  params:
    - name: id
      value: sub_VXJBYgP2u0eO
      type: path
      description: Identificador único da assinatura no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

