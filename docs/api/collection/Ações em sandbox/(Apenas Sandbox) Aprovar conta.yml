info:
  name: (Apenas Sandbox) Aprovar conta
  type: http
  seq: 1
  tags:
    - Ações em sandbox

http:
  method: POST
  url: "{{baseUrl}}/v3/sandbox/myAccount/approve"
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/sandbox/myAccount/approve"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "a910f50b-8745-4bc6-89fe-f1931c6a2e05",
            "commercialInfo": "APPROVED",
            "bankAccountInfo": "APPROVED",
            "documentation": "APPROVED",
            "general": "APPROVED"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/sandbox/myAccount/approve"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/sandbox/myAccount/approve"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }

docs: Este endpoint aprova a sua conta no ambiente sandbox.
