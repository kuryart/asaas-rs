info:
  name: Salvar ou atualizar configuração da pré-autorização
  type: http
  seq: 2
  tags:
    - Cartão de crédito

http:
  method: POST
  url: "{{baseUrl}}/v3/creditCard/preAuthorization/config"
  body:
    type: json
    data: |-
      {
        "daysToExpire": 5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/creditCard/preAuthorization/config"
      method: POST
      body:
        type: json
        data: |-
          {
            "daysToExpire": 5
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "daysToExpire": 5
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/creditCard/preAuthorization/config"
      method: POST
      body:
        type: json
        data: |-
          {
            "daysToExpire": 5
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_action",
                "description": "O prazo de cobranças com pré-autorização deve estar dentro do intervalo de 3 a 25 dias."
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/creditCard/preAuthorization/config"
      method: POST
      body:
        type: json
        data: |-
          {
            "daysToExpire": 5
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
