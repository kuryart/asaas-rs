info:
  name: Tokenização de cartão de crédito
  type: http
  seq: 1
  tags:
    - Cartão de crédito

http:
  method: POST
  url: "{{baseUrl}}/v3/creditCard/tokenizeCreditCard"
  body:
    type: json
    data: |-
      {
        "customer": "cus_G7Dvo4iphUNk",
        "creditCard": {
          "holderName": "John Doe",
          "number": "1234567890123456",
          "expiryMonth": "7",
          "expiryYear": "2026",
          "ccv": "123"
        },
        "creditCardHolderInfo": {
          "name": "John Doe",
          "email": "john.doe@asaas.com",
          "cpfCnpj": "12345678901",
          "postalCode": "12345678",
          "addressNumber": "123",
          "addressComplement": null,
          "phone": null,
          "mobilePhone": null
        },
        "remoteIp": "116.213.42.532"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

