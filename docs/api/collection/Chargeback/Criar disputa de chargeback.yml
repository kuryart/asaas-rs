info:
  name: Criar disputa de chargeback
  type: http
  seq: 1
  tags:
    - Chargeback

http:
  method: POST
  url: "{{baseUrl}}/v3/chargebacks/:id/dispute"
  params:
    - name: id
      value: 8e784c3e-afe8-4844-bb93-6b445763
      type: path
      description: Identificador único do chargeback para o qual a disputa será criada.
  body:
    type: multipart-form
    data:
      - name: files
        type: file
        value: []
        description: "Arquivos para criar a disputa (Máximo: 11)."
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/chargebacks/:id/dispute"
      method: POST
      params:
        - name: id
          value: 8e784c3e-afe8-4844-bb93-6b445763
          type: path
          description: Identificador único do chargeback para o qual a disputa será criada.
      body:
        type: multipart-form
        data:
          - name: files
            type: file
            value: []
            description: "Arquivos para criar a disputa (Máximo: 11)."
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "chargebackId": "2765d086-c7c5-5cca-898a-4262d212587c",
            "status": "REQUESTED",
            "files": [
              null
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
