info:
  name: Recuperar um único chargeback
  type: http
  seq: 3
  tags:
    - Chargeback

http:
  method: GET
  url: "{{baseUrl}}/v3/payments/:id/chargeback"
  params:
    - name: id
      value: pay_s02s330x4pox1x0y
      type: path
      description: Identificador único do pagamento ou do parcelamento para o qual o chargeback será recuperado.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

