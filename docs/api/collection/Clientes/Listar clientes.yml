info:
  name: Listar clientes
  type: http
  seq: 2
  tags:
    - Clientes

http:
  method: GET
  url: "{{baseUrl}}/v3/customers"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: name
      value: John Doe
      type: query
      description: Filtrar por nome
    - name: email
      value: john.doe@asaas.com.br
      type: query
      description: Filtrar por email
    - name: cpfCnpj
      value: "24971563792"
      type: query
      description: Filtrar por CPF ou CNPJ
    - name: groupName
      value: "null"
      type: query
      description: Filtrar por grupo
    - name: externalReference
      value: "null"
      type: query
      description: Filtrar pelo Identificador do seu sistema
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

