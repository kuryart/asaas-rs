info:
  name: Recuperar um único cliente
  type: http
  seq: 3
  tags:
    - Clientes

http:
  method: GET
  url: "{{baseUrl}}/v3/customers/:id"
  params:
    - name: id
      value: cus_000005401844
      type: path
      description: Identificador único do cliente no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

