info:
  name: Recuperar uma única cobrança com dados resumidos
  type: http
  seq: 5
  tags:
    - Cobranças com dados resumidos

http:
  method: GET
  url: "{{baseUrl}}/v3/lean/payments/:id"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da cobrança no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

