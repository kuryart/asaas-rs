info:
  name: Obter linha digitável do boleto
  type: http
  seq: 15
  tags:
    - Cobranças

http:
  method: GET
  url: "{{baseUrl}}/v3/payments/:id/identificationField"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da cobrança no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/payments/:id/identificationField"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "identificationField": "00190000090275928800021932978170187890000005000",
            "nossoNumero": "6543",
            "barCode": "00191878900000050000000002759288002193297817"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/payments/:id/identificationField"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
