info:
  name: Simulador de vendas
  type: http
  seq: 19
  tags:
    - Cobranças

http:
  method: POST
  url: "{{baseUrl}}/v3/payments/simulate"
  body:
    type: json
    data: |-
      {
        "value": 100,
        "installmentCount": 2,
        "billingTypes": [
          "CREDIT_CARD",
          "BOLETO",
          "PIX"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/payments/simulate"
      method: POST
      body:
        type: json
        data: |-
          {
            "value": 100,
            "installmentCount": 2,
            "billingTypes": [
              "CREDIT_CARD",
              "BOLETO",
              "PIX"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": 100,
            "creditCard": {
              "netValue": 100,
              "feePercentage": 2.49,
              "operationFee": 0.49,
              "installment": {
                "paymentNetValue": 48.52,
                "paymentValue": 50
              }
            },
            "bankSlip": {
              "netValue": 98.02,
              "feeValue": 0.99,
              "installment": {
                "paymentNetValue": 48.52,
                "paymentValue": 50
              }
            },
            "pix": {
              "netValue": 98.02,
              "feePercentage": null,
              "feeValue": 0.99,
              "installment": {
                "paymentNetValue": 48.52,
                "paymentValue": 50
              }
            }
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/payments/simulate"
      method: POST
      body:
        type: json
        data: |-
          {
            "value": 100,
            "installmentCount": 2,
            "billingTypes": [
              "CREDIT_CARD",
              "BOLETO",
              "PIX"
            ]
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/payments/simulate"
      method: POST
      body:
        type: json
        data: |-
          {
            "value": 100,
            "installmentCount": 2,
            "billingTypes": [
              "CREDIT_CARD",
              "BOLETO",
              "PIX"
            ]
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
