info:
  name: Criar novo webhook
  type: http
  seq: 1
  tags:
    - Configurações de Webhooks

http:
  method: POST
  url: "{{baseUrl}}/v3/webhooks"
  body:
    type: json
    data: |-
      {
        "name": "Nome exemplo",
        "url": "https://www.example.com/webhook/asaas",
        "email": "john.doe@asaas.com.br",
        "enabled": true,
        "interrupted": false,
        "apiVersion": 3,
        "authToken": "whsec_Pxeh17yy3LQbLVpnzz6I1chB7mtzYk5F7pg8bRR80pE",
        "sendType": "SEQUENTIALLY",
        "events": [
          "PAYMENT_RECEIVED",
          "PAYMENT_CONFIRMED"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/webhooks"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Nome exemplo",
            "url": "https://www.example.com/webhook/asaas",
