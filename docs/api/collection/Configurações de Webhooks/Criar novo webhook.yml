            "enabled": true,
            "interrupted": false,
            "apiVersion": 3,
            "authToken": "whsec_Pxeh17yy3LQbLVpnzz6I1chB7mtzYk5F7pg8bRR80pE",
            "sendType": "SEQUENTIALLY",
            "events": [
              "PAYMENT_RECEIVED",
              "PAYMENT_CONFIRMED"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "bbf67496-1379-4b6d-a348-fd5fa229f1c",
            "name": "Nome Exemplo",
