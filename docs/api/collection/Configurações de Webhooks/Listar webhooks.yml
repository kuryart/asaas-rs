info:
  name: Listar webhooks
  type: http
  seq: 2
  tags:
    - Configurações de Webhooks

http:
  method: GET
  url: "{{baseUrl}}/v3/webhooks"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/webhooks"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "id": "bbf67496-1379-4b6d-a348-fd5fa229f1c",
                "name": "Nome Exemplo",
                "url": "https://www.example.com/webhook/asaas",
                "email": "john.doe@asaas.com.br",
                "enabled": true,
                "interrupted": false,
                "apiVersion": 3,
                "hasAuthToken": true,
                "sendType": "SEQUENTIALLY",
                "penalizedRequestsCount": 0,
                "events": [
                  "PAYMENT_RECEIVED",
                  "PAYMENT_CONFIRMED"
                ]
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/webhooks"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/webhooks"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/webhooks"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""

docs: Endpoint para listar todos os Webhooks cadastrados na sua conta.
