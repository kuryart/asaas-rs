info:
  name: Listar consultas
  type: http
  seq: 2
  tags:
    - Consulta Serasa

http:
  method: GET
  url: "{{baseUrl}}/v3/creditBureauReport"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: startDate
      value: "null"
      type: query
      description: Filtrar a partir da data de criação
    - name: endDate
      value: "null"
      type: query
      description: Filtrar até uma data de criação
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
