info:
  name: Realizar consulta
  type: http
  seq: 1
  tags:
    - Consulta Serasa

http:
  method: POST
  url: "{{baseUrl}}/v3/creditBureauReport"
  body:
    type: json
    data: |-
      {
        "customer": null,
        "cpfCnpj": "05666663755"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/creditBureauReport"
      method: POST
      body:
        type: json
        data: |-
          {
            "customer": null,
            "cpfCnpj": "05666663755"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed",
            "dateCreated": "2025-05-30",
            "cpfCnpj": "05666663755",
            "customer": "cus_000000001766",
            "downloadUrl": "https://www.asaas.com.br/creditBureauReport/download/6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed",
            "reportFile": null
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/creditBureauReport"
      method: POST
      body:
        type: json
        data: |-
          {
            "customer": null,
            "cpfCnpj": "05666663755"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/creditBureauReport"
      method: POST
      body:
        type: json
        data: |-
          {
            "customer": null,
            "cpfCnpj": "05666663755"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
