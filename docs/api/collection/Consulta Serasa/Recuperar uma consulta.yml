info:
  name: Recuperar uma consulta
  type: http
  seq: 3
  tags:
    - Consulta Serasa

http:
  method: GET
  url: "{{baseUrl}}/v3/creditBureauReport/:id"
  params:
    - name: id
      value: 6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed
      type: path
      description: Identificador único da consulta no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/creditBureauReport/:id"
      method: GET
      params:
        - name: id
          value: 6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed
          type: path
          description: Identificador único da consulta no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed",
            "dateCreated": "2025-05-30",
            "cpfCnpj": "05666663755",
            "customer": "cus_000000001766",
            "downloadUrl": "https://www.asaas.com.br/creditBureauReport/download/6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed",
            "reportFile": null
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/creditBureauReport/:id"
      method: GET
      params:
        - name: id
          value: 6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed
          type: path
          description: Identificador único da consulta no Asaas
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/creditBureauReport/:id"
      method: GET
      params:
        - name: id
          value: 6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed
          type: path
          description: Identificador único da consulta no Asaas
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/creditBureauReport/:id"
      method: GET
      params:
        - name: id
          value: 6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed
          type: path
          description: Identificador único da consulta no Asaas
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/v3/creditBureauReport/:id"
      method: GET
      params:
        - name: id
          value: 6c5e73fa-9efd-4a75-b60c-1cafb8d1c7ed
          type: path
          description: Identificador único da consulta no Asaas
    response:
