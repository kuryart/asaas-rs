info:
  name: Criar configuração padrão da Conta Escrow para todas as subcontas
  type: http
  seq: 3
  tags:
    - Conta Escrow

http:
  method: POST
  url: "{{baseUrl}}/v3/accounts/escrow"
  body:
    type: json
    data: |-
      {
        "daysToExpire": 30,
        "enabled": true,
        "isFeePayer": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/accounts/escrow"
      method: POST
      body:
        type: json
        data: |-
          {
            "daysToExpire": 30,
            "enabled": true,
            "isFeePayer": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "daysToExpire": 30,
            "enabled": true,
            "isFeePayer": false
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/accounts/escrow"
      method: POST
      body:
        type: json
        data: |-
          {
            "daysToExpire": 30,
            "enabled": true,
            "isFeePayer": false
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_action",
                "description": "Contas filhas não podem criar configuração da Conta Escrow."
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/accounts/escrow"
      method: POST
      body:
        type: json
        data: |-
          {
            "daysToExpire": 30,
            "enabled": true,
            "isFeePayer": false
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
