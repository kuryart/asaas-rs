info:
  name: Recuperar configuração da Conta Escrow para a subconta
  type: http
  seq: 2
  tags:
    - Conta Escrow

http:
  method: GET
  url: "{{baseUrl}}/v3/accounts/:id/escrow"
  params:
    - name: id
      value: 4f468235-cec3-482f-b3d0-348af4c7194
      type: path
      description: Identificador único da subconta no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/accounts/:id/escrow"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "daysToExpire": 30,
            "enabled": true,
            "isFeePayer": false
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/accounts/:id/escrow"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/accounts/:id/escrow"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/accounts/:id/escrow"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/v3/accounts/:id/escrow"
