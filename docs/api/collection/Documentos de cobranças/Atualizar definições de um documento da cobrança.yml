info:
  name: Atualizar definições de um documento da cobrança
  type: http
  seq: 3
  tags:
    - Documentos de cobranças

http:
  method: PUT
  url: "{{baseUrl}}/v3/payments/:id/documents/:documentId"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da cobrança no Asaas
    - name: documentId
      value: "null"
      type: path
      description: Identificador único do documento
  body:
    type: json
    data: |-
      {
        "availableAfterPayment": true,
        "type": "INVOICE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

