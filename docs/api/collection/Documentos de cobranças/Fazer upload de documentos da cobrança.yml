info:
  name: Fazer upload de documentos da cobrança
  type: http
  seq: 1
  tags:
    - Documentos de cobranças

http:
  method: POST
  url: "{{baseUrl}}/v3/payments/:id/documents"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da cobrança no Asaas
  body:
    type: multipart-form
    data:
      - name: availableAfterPayment
        type: text
        value: "true"
        description: true para disponibilizar o documento apenas após o pagamento
      - name: type
        type: text
        value: INVOICE
        description: Tipo de documento
      - name: file
        type: file
        value: []
        description: Arquivo
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/payments/:id/documents"
      method: POST
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
      body:
        type: multipart-form
        data:
          - name: availableAfterPayment
            type: text
            value: "true"
            description: true para disponibilizar o documento apenas após o pagamento
          - name: type
            type: text
            value: INVOICE
            description: Tipo de documento
          - name: file
            type: file
            value: []
            description: Arquivo
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "paymentDocument",
            "id": "609a3f98-8db7-4a89-b511-de4c3be6d462",
            "name": "Nota Fiscal.pdf",
            "type": "INVOICE",
            "availableAfterPayment": true,
