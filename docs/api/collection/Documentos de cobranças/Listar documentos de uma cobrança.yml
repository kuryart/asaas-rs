info:
  name: Listar documentos de uma cobrança
  type: http
  seq: 2
  tags:
    - Documentos de cobranças

http:
  method: GET
  url: "{{baseUrl}}/v3/payments/:id/documents"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da cobrança no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/payments/:id/documents"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "object": "paymentDocument",
                "id": "609a3f98-8db7-4a89-b511-de4c3be6d462",
                "name": "Nota Fiscal.pdf",
                "type": "INVOICE",
                "availableAfterPayment": true,
                "file": {
                  "publicId": "TSrLvzPGF7HPQhYu9OZhZSBX3mm1sxpToEcFm30imOM3sKEjhzCc1zAIuqQ7n11",
                  "originalName": "Nota Fiscal.pdf",
                  "size": 14499,
                  "extension": "pdf",
                  "previewUrl": "https://www.asaas.com/file/preview/TSrLvzPGF7HPQhYu9OZhZSBX3mm1sxpToEcFm30imOM3sKEjhzCc1zAIuqQ7n11",
                  "downloadUrl": "https://www.asaas.com/file/public/download/TSrLvzPGF7HPQhYu9OZhZSBX3mm1sxpToEcFm30imOM3sKEjhzCc1zAIuqQ7n11"
                },
                "deleted": false
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/payments/:id/documents"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/payments/:id/documents"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/payments/:id/documents"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/v3/payments/:id/documents"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança no Asaas
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
