info:
  name: Visualizar documento enviado
  type: http
  seq: 3
  tags:
    - Envio de documentos White Label

http:
  method: GET
  url: "{{baseUrl}}/v3/myAccount/documents/files/:id"
  params:
    - name: id
      value: 8d257732-2220-11ec-b695-b6af4a64184d
      type: path
      description: Identificador único do documento no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/myAccount/documents/files/:id"
      method: GET
      params:
        - name: id
          value: 8d257732-2220-11ec-b695-b6af4a64184d
          type: path
          description: Identificador único do documento no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "8d257732-2220-11ec-b695-b6af4a64184d",
            "status": "PENDING"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/myAccount/documents/files/:id"
