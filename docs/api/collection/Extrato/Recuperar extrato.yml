info:
  name: Recuperar extrato
  type: http
  seq: 1
  tags:
    - Extrato

http:
  method: GET
  url: "{{baseUrl}}/v3/financialTransactions"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: startDate
      value: 2023-03-01
      type: query
      description: Data inicial da lista
    - name: finishDate
      value: 2023-03-31
      type: query
      description: Data final da lista
    - name: order
      value: asc
      type: query
      description: Ordenação do resultado
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/financialTransactions"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
        - name: startDate
          value: 2023-03-01
          type: query
          description: Data inicial da lista
        - name: finishDate
          value: 2023-03-31
          type: query
          description: Data final da lista
        - name: order
          value: asc
          type: query
          description: Ordenação do resultado
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "object": "financialTransaction",
                "id": "ftn_000015274322",
