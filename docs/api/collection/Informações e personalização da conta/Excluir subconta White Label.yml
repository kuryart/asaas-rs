info:
  name: Excluir subconta White Label
  type: http
  seq: 9
  tags:
    - Informações e personalização da conta

http:
  method: DELETE
  url: "{{baseUrl}}/v3/myAccount/"
  params:
    - name: removeReason
      value: Liberar dados
      type: query
      description: Motivo da remoção
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/myAccount/"
      method: DELETE
      params:
        - name: removeReason
          value: Liberar dados
          type: query
          description: Motivo da remoção
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "observations": "Conta desabilitada com sucesso"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/myAccount/"
      method: DELETE
      params:
        - name: removeReason
          value: Liberar dados
          type: query
          description: Motivo da remoção
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/myAccount/"
      method: DELETE
      params:
        - name: removeReason
          value: Liberar dados
          type: query
          description: Motivo da remoção
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
