info:
  name: Recuperar WalletId
  type: http
  seq: 8
  tags:
    - Informações e personalização da conta

http:
  method: GET
  url: "{{baseUrl}}/v3/wallets/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/wallets/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "object": "wallet",
                "id": "0000c712-0a0b-a0b0-0000-031e7ac51a2"
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/wallets/"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/wallets/"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/wallets/"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
