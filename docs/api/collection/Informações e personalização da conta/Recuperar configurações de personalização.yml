info:
  name: Recuperar configurações de personalização
  type: http
  seq: 4
  tags:
    - Informações e personalização da conta

http:
  method: GET
  url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "paymentCheckoutConfig",
            "logoBackgroundColor": "#00ff00",
            "infoBackgroundColor": "#000fff",
            "fontColor": "#00ff00",
            "enabled": true,
            "logoUrl": null,
            "observations": "Aprovado automaticamente pelo sistema.",
            "status": "APPROVED"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
