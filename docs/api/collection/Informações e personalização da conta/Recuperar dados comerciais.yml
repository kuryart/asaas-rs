info:
  name: Recuperar dados comerciais
  type: http
  seq: 1
  tags:
    - Informações e personalização da conta

http:
  method: GET
  url: "{{baseUrl}}/v3/myAccount/commercialInfo/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/myAccount/commercialInfo/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "APPROVED",
            "personType": "JURIDICA",
            "cpfCnpj": "66625514000140",
            "name": "John Doe",
            "birthDate": "1995-04-12",
            "companyName": null,
            "companyType": "MEI",
            "incomeValue": 250000,
            "email": "john.doe@asaas.com.br",
            "phone": null,
            "mobilePhone": null,
            "postalCode": "89223005",
            "address": "Av. Rolf Wiest",
            "addressNumber": "659",
            "complement": null,
            "province": "Bom retiro",
            "city": {
              "object": "city",
              "id": 13660,
              "ibgeCode": "4209102",
              "name": "Joinville",
              "districtCode": "05",
              "district": "Joinville",
              "state": "SC"
            },
            "denialReason": null,
            "tradingName": null,
            "site": null,
            "availableCompanyNames": [
              "ASAAS GESTAO FINANCEIRA S.A.",
              "ASAAS"
            ],
            "commercialInfoExpiration": {
              "isExpired": false,
              "scheduledDate": "2025-05-05 00:00:00"
            }
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/myAccount/commercialInfo/"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/myAccount/commercialInfo/"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/myAccount/commercialInfo/"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
