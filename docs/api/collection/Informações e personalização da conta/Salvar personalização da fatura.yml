info:
  name: Salvar personalização da fatura
  type: http
  seq: 3
  tags:
    - Informações e personalização da conta

http:
  method: POST
  url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
  body:
    type: multipart-form
    data:
      - name: logoBackgroundColor
        type: text
        value: "#00ff00"
        description: Cor de fundo do logo
      - name: infoBackgroundColor
        type: text
        value: "#000fff"
        description: Cor de fundo das suas informações
      - name: fontColor
        type: text
        value: "#00ff0"
        description: Cor da fonte das suas informações
      - name: enabled
        type: text
        value: "true"
        description: Indica se a personalização está habilitada
      - name: logoFile
        type: file
        value: []
        description: Arquivo
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: POST
      body:
        type: multipart-form
        data:
          - name: logoBackgroundColor
            type: text
            value: "#00ff00"
            description: Cor de fundo do logo
          - name: infoBackgroundColor
            type: text
            value: "#000fff"
            description: Cor de fundo das suas informações
          - name: fontColor
            type: text
            value: "#00ff0"
            description: Cor da fonte das suas informações
          - name: enabled
            type: text
            value: "true"
            description: Indica se a personalização está habilitada
          - name: logoFile
            type: file
            value: []
            description: Arquivo
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "paymentCheckoutConfig",
            "logoBackgroundColor": "#00ff00",
            "infoBackgroundColor": "#000fff",
            "fontColor": "#00ff00",
            "enabled": true,
            "logoUrl": null,
            "observations": "Aprovado automaticamente pelo sistema.",
            "status": "APPROVED"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: POST
      body:
        type: multipart-form
        data:
          - name: logoBackgroundColor
            type: text
            value: "#00ff00"
            description: Cor de fundo do logo
          - name: infoBackgroundColor
            type: text
            value: "#000fff"
            description: Cor de fundo das suas informações
          - name: fontColor
            type: text
            value: "#00ff0"
            description: Cor da fonte das suas informações
          - name: enabled
            type: text
            value: "true"
            description: Indica se a personalização está habilitada
          - name: logoFile
            type: file
            value: []
            description: Arquivo
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/myAccount/paymentCheckoutConfig/"
      method: POST
      body:
        type: multipart-form
        data:
          - name: logoBackgroundColor
            type: text
            value: "#00ff00"
            description: Cor de fundo do logo
          - name: infoBackgroundColor
            type: text
            value: "#000fff"
            description: Cor de fundo das suas informações
          - name: fontColor
            type: text
            value: "#00ff0"
            description: Cor da fonte das suas informações
          - name: enabled
            type: text
            value: "true"
            description: Indica se a personalização está habilitada
          - name: logoFile
            type: file
            value: []
            description: Arquivo
    response:
      status: 401
      statusText: Unauthorized
