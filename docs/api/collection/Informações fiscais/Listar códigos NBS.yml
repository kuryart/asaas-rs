info:
  name: Listar códigos NBS
  type: http
  seq: 6
  tags:
    - Informações fiscais

http:
  method: GET
  url: "{{baseUrl}}/v3/fiscalInfo/nbsCodes"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: codeDescription
      value: 1.0101.11.00 - Serviços de construção de edificações residenciais de um e dois pavimentos
      type: query
      description: Código NBS e descrição
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/fiscalInfo/nbsCodes"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
        - name: codeDescription
          value: 1.0101.11.00 - Serviços de construção de edificações residenciais de um e dois pavimentos
          type: query
          description: Código NBS e descrição
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "nbsCode": "1.0101.11.00",
                "codeDescription": "1.0101.11.00 - Serviços de construção de edificações residenciais de um e dois pavimentos"
              },
              {
                "nbsCode": "1.0102.12.00",
                "codeDescription": "1.0102.12.00 - Serviços de construção de ferrovias"
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/fiscalInfo/nbsCodes"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
        - name: codeDescription
          value: 1.0101.11.00 - Serviços de construção de edificações residenciais de um e dois pavimentos
          type: query
          description: Código NBS e descrição
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/fiscalInfo/nbsCodes"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
        - name: codeDescription
          value: 1.0101.11.00 - Serviços de construção de edificações residenciais de um e dois pavimentos
          type: query
          description: Código NBS e descrição
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/fiscalInfo/nbsCodes"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
        - name: codeDescription
          value: 1.0101.11.00 - Serviços de construção de edificações residenciais de um e dois pavimentos
          type: query
          description: Código NBS e descrição
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""

