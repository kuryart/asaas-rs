info:
  name: Listar códigos de indicadores de operações
  type: http
  seq: 7
  tags:
    - Informações fiscais

http:
  method: GET
  url: "{{baseUrl}}/v3/fiscalInfo/operationIndicatorCodes"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: code
      value: "020101"
      type: query
      description: Código do indicador da operação
    - name: description
      value: Execução de operações com bem imóvel, bem imaterial, inclusive direito, relacionado a bem imóvel
      type: query
      description: Descrição
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/fiscalInfo/operationIndicatorCodes"
      method: GET
      params:
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
        - name: code
          value: "020101"
          type: query
          description: Código do indicador da operação
        - name: description
          value: Execução de operações com bem imóvel, bem imaterial, inclusive direito, relacionado a bem imóvel
          type: query
          description: Descrição
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "code": "020101",
                "description": "Execução de operações com bem imóvel, bem imaterial, inclusive direito, relacionado a bem imóvel"
              }
            ]
          }
