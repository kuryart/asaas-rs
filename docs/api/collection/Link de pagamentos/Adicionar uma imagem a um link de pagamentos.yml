info:
  name: Adicionar uma imagem a um link de pagamentos
  type: http
  seq: 7
  tags:
    - Link de pagamentos

http:
  method: POST
  url: "{{baseUrl}}/v3/paymentLinks/:id/images"
  params:
    - name: id
      value: "725104409743"
      type: path
      description: Identificador único do seu link de pagamentos no Asaas
  body:
    type: multipart-form
    data:
      - name: main
        type: text
        value: "true"
        description: true para definir como a imagem principal
      - name: image
        type: file
        value: []
        description: Arquivo
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

