info:
  name: Listar imagens de um link de pagamentos
  type: http
  seq: 8
  tags:
    - Link de pagamentos

http:
  method: GET
  url: "{{baseUrl}}/v3/paymentLinks/:id/images"
  params:
    - name: id
      value: "725104409743"
      type: path
      description: Identificador único do seu link de pagamentos no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

