info:
  name: Listar links de pagamentos
  type: http
  seq: 2
  tags:
    - Link de pagamentos

http:
  method: GET
  url: "{{baseUrl}}/v3/paymentLinks"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: active
      value: "null"
      type: query
      description: Filtrar por links de pagamentos ativados ou desativados
    - name: includeDeleted
      value: "null"
      type: query
      description: True para recuperar também os links de pagamentos removidos
    - name: name
      value: "null"
      type: query
      description: Filtrar pelo nome do link de pagamentos
    - name: externalReference
      value: "null"
      type: query
      description: Filtrar pelo Identificador do seu sistema
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

