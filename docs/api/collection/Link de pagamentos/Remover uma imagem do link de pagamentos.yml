  type: http
  seq: 10
  tags:
    - Link de pagamentos

http:
  method: DELETE
  url: "{{baseUrl}}/v3/paymentLinks/:paymentLinkId/images/:imageId"
  params:
    - name: paymentLinkId
      value: "725104409743"
      type: path
      description: Identificador único do seu link de pagamentos no Asaas
    - name: imageId
      value: 417d1fe7-f530-4368-935f-699045f2bf5d
      type: path
      description: Identificador único da imagem do seu link de pagamentos no Asaas
  auth: inherit

settings:
