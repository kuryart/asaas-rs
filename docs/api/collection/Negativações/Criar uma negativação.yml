info:
  name: Criar uma negativação
  type: http
  seq: 1
  tags:
    - Negativações

http:
  method: POST
  url: "{{baseUrl}}/v3/paymentDunnings"
  body:
    type: multipart-form
    data:
      - name: payment
        type: text
        value: pay_080225913252
        description: Identificador único da cobrança a ser recuperada no Asaas
      - name: type
        type: text
        value: CREDIT_BUREAU
        description: Tipo de negativação
      - name: description
        type: text
        value: Duas mesas com 8 cadeiras solicitadas via encomenda no dia 01/05/2018
        description: Descrição do produto ou serviço prestado
      - name: customerName
        type: text
        value: John Doe
        description: Nome do cliente
      - name: customerCpfCnpj
        type: text
        value: 378.285.120-07
        description: CPF ou CNPJ do cliente
      - name: customerPrimaryPhone
        type: text
        value: (11) 99999-9999
        description: Telefone principal do cliente
      - name: customerSecondaryPhone
        type: text
        value: (11) 99999-9999
        description: Telefone secundário do cliente
      - name: customerPostalCode
        type: text
        value: 99050-460
        description: CEP do endereço do cliente
      - name: customerAddress
        type: text
        value: Rua Izaías Fontana
        description: Logradouro do cliente
      - name: customerAddressNumber
        type: text
        value: "123"
        description: Número do endereço do cliente
      - name: customerComplement
        type: text
        value: AP 101
        description: Complemento do endereço do cliente
      - name: customerProvince
        type: text
        value: Petrópolis
        description: Bairro do cliente
      - name: documents
        type: file
        value: []
        description: Nota fiscal e/ou contrato com firma reconhecida em cartório
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

