  type: http
  seq: 7
  tags:
    - Negativações

http:
  method: GET
  url: "{{baseUrl}}/v3/paymentDunnings/paymentsAvailableForDunning"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: Número de elementos da lista
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

