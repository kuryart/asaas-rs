info:
  name: Listar histórico de eventos
  type: http
  seq: 5
  tags:
    - Negativações

http:
  method: GET
  url: "{{baseUrl}}/v3/paymentDunnings/:id/history"
  params:
    - name: id
      value: ce35702d-0d9f-475a-ba46-e251ad265c91
      type: path
      description: Identificador único da negativação no Asaas
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: Número de elementos da lista
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/paymentDunnings/:id/history"
      method: GET
      params:
        - name: id
          value: ce35702d-0d9f-475a-ba46-e251ad265c91
          type: path
          description: Identificador único da negativação no Asaas
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: Número de elementos da lista
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "status": "NEGOTIATED",
                "description": "Negativação negociada com o cliente. O pagamento será iniciado.",
                "eventDate": "2019-02-20"
              }
            ]
          }
