info:
  name: Listar pagamentos recebidos
  type: http
  seq: 6
  tags:
    - Negativações

http:
  method: GET
  url: "{{baseUrl}}/v3/paymentDunnings/:id/partialPayments"
  params:
    - name: id
      value: ce35702d-0d9f-475a-ba46-e251ad265c91
      type: path
      description: Identificador único da negativação no Asaas
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: Número de elementos da lista
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/paymentDunnings/:id/partialPayments"
      method: GET
      params:
        - name: id
          value: ce35702d-0d9f-475a-ba46-e251ad265c91
          type: path
          description: Identificador único da negativação no Asaas
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: Número de elementos da lista
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "value": 800,
                "description": "A quitação desta cobrança foi efetuada pelo cliente.",
                "paymentDate": "2020-02-10"
              },
              {
                "value": 800,
                "description": "Pagamento parcial efetuado pelo cliente. Há pagamentos pendentes para a quitação dessa cobrança.",
