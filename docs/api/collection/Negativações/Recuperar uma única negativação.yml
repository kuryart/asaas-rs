  type: http
  seq: 4
  tags:
    - Negativações

http:
  method: GET
  url: "{{baseUrl}}/v3/paymentDunnings/:id"
  params:
    - name: id
      value: ce35702d-0d9f-475a-ba46-e251ad265c91
      type: path
      description: Identificador único da negativação no Asaas
  auth: inherit

settings:
