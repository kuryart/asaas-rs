info:
  name: Simular uma negativação
  type: http
  seq: 3
  tags:
    - Negativações

http:
  method: POST
  url: "{{baseUrl}}/v3/paymentDunnings/simulate"
  params:
    - name: payment
      value: pay_080225913252
      type: query
      description: Identificador único da cobrança a ser recuperada no Asaas
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

