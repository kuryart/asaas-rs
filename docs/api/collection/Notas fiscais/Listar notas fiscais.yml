info:
  name: Listar notas fiscais
  type: http
  seq: 2
  tags:
    - Notas fiscais

http:
  method: GET
  url: "{{baseUrl}}/v3/invoices"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: effectiveDate[Ge]
      value: 2024-08-03
      type: query
      description: Filtrar a partir de uma data de emissão
    - name: effectiveDate[Le]
      value: 2024-09-03
      type: query
      description: Filtrar até uma data de emissão
    - name: payment
      value: "null"
      type: query
      description: Filtrar pelo identificador único da cobrança
    - name: installment
      value: "null"
      type: query
      description: Filtrar pelo identificador único do parcelamento
    - name: externalReference
      value: "null"
      type: query
      description: Filtrar pelo identificador da nota fiscal no seu sistema
    - name: status
      value: SCHEDULED
      type: query
      description: Filtrar por situação
      disabled: true
    - name: status
      value: AUTHORIZED
      type: query
      description: Filtrar por situação
      disabled: true
    - name: status
      value: PROCESSING_CANCELLATION
      type: query
      description: Filtrar por situação
      disabled: true
    - name: status
      value: CANCELED
      type: query
      description: Filtrar por situação
      disabled: true
    - name: status
      value: CANCELLATION_DENIED
      type: query
      description: Filtrar por situação
      disabled: true
    - name: status
      value: ERROR
      type: query
      description: Filtrar por situação
      disabled: true
    - name: customer
      value: "null"
      type: query
      description: Filtrar pelo identificador único do cliente
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

