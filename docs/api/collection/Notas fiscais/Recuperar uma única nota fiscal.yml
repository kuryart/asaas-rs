info:
  name: Recuperar uma única nota fiscal
  type: http
  seq: 4
  tags:
    - Notas fiscais

http:
  method: GET
  url: "{{baseUrl}}/v3/invoices/:id"
  params:
    - name: id
      value: inv_000000000232
      type: path
      description: Identificador único da nota fiscal no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

