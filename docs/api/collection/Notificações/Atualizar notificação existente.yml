  type: http
  seq: 1
  tags:
    - Notificações

http:
  method: PUT
  url: "{{baseUrl}}/v3/notifications/:id"
  params:
    - name: id
      value: not_wuGp97JeCr7G
      type: path
      description: Identificador único da notificação a ser atualizada
  body:
    type: json
    data: |-
      {
        "enabled": true,
        "emailEnabledForProvider": true,
        "smsEnabledForProvider": true,
        "emailEnabledForCustomer": true,
        "smsEnabledForCustomer": true,
        "phoneCallEnabledForCustomer": false,
        "whatsappEnabledForCustomer": false,
        "scheduleOffset": 1
      }
  auth: inherit

