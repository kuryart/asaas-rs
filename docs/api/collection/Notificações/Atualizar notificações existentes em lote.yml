info:
  name: Atualizar notificações existentes em lote
  type: http
  seq: 2
  tags:
    - Notificações

http:
  method: PUT
  url: "{{baseUrl}}/v3/notifications/batch"
  body:
    type: json
    data: |-
      {
        "customer": "cus_000005401844",
        "notifications": [
          {
            "id": "not_wuGp97JeCr7G",
            "enabled": true,
            "emailEnabledForProvider": true,
            "smsEnabledForProvider": true,
            "emailEnabledForCustomer": true,
            "smsEnabledForCustomer": true,
            "phoneCallEnabledForCustomer": false,
            "whatsappEnabledForCustomer": false,
            "scheduleOffset": 1
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/notifications/batch"
      method: PUT
      body:
        type: json
        data: |-
          {
            "customer": "cus_000005401844",
            "notifications": [
              {
                "id": "not_wuGp97JeCr7G",
                "enabled": true,
                "emailEnabledForProvider": true,
                "smsEnabledForProvider": true,
                "emailEnabledForCustomer": true,
                "smsEnabledForCustomer": true,
                "phoneCallEnabledForCustomer": false,
                "whatsappEnabledForCustomer": false,
                "scheduleOffset": 1
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "notifications": [
              {
                "object": "notification",
                "id": "not_wuGp97JeCr7G",
                "customer": "cus_000005401844",
                "enabled": true,
                "emailEnabledForProvider": true,
                "smsEnabledForProvider": true,
                "emailEnabledForCustomer": true,
                "smsEnabledForCustomer": true,
                "phoneCallEnabledForCustomer": false,
                "whatsappEnabledForCustomer": false,
                "event": "PAYMENT_CREATED",
                "scheduleOffset": 1,
                "deleted": true
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/notifications/batch"
      method: PUT
      body:
        type: json
        data: |-
          {
            "customer": "cus_000005401844",
            "notifications": [
              {
                "id": "not_wuGp97JeCr7G",
                "enabled": true,
                "emailEnabledForProvider": true,
                "smsEnabledForProvider": true,
                "emailEnabledForCustomer": true,
                "smsEnabledForCustomer": true,
                "phoneCallEnabledForCustomer": false,
                "whatsappEnabledForCustomer": false,
                "scheduleOffset": 1
              }
            ]
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/notifications/batch"
      method: PUT
      body:
        type: json
        data: |-
          {
            "customer": "cus_000005401844",
            "notifications": [
              {
                "id": "not_wuGp97JeCr7G",
                "enabled": true,
                "emailEnabledForProvider": true,
                "smsEnabledForProvider": true,
                "emailEnabledForCustomer": true,
                "smsEnabledForCustomer": true,
                "phoneCallEnabledForCustomer": false,
                "whatsappEnabledForCustomer": false,
                "scheduleOffset": 1
              }
            ]
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }

docs: É possível personalizar várias notificações, independente do canal de comunicação que utilizar (email, SMS e voz) e quem deve receber a notificação(você e/ou seu cliente) enviando qual o id do cliente e as notificações a serem atualizadas.
