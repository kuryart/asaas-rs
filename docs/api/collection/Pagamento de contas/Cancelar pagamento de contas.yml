  type: http
  seq: 5
  tags:
    - Pagamento de contas

http:
  method: POST
  url: "{{baseUrl}}/v3/bill/:id/cancel"
  params:
    - name: id
      value: 1bce822-6f37-4905-8de8-f1af9f2f4bab
      type: path
      description: Identificador único do pagamento de conta a ser cancelado
  body:
    type: json
    data: "{}"
  auth: inherit

