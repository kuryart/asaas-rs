info:
  name: Recuperar um único pagamento de conta
  type: http
  seq: 4
  tags:
    - Pagamento de contas

http:
  method: GET
  url: "{{baseUrl}}/v3/bill/:id"
  params:
    - name: id
      value: f1bce822-6f37-4905-8de8-f1af9f2f4bab
      type: path
      description: Identificador único do pagamento de conta no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

