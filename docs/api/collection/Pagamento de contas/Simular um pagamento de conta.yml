info:
  name: Simular um pagamento de conta
  type: http
  seq: 3
  tags:
    - Pagamento de contas

http:
  method: POST
  url: "{{baseUrl}}/v3/bill/simulate"
  body:
    type: json
    data: |-
      {
        "identificationField": "03399.77779 29900.000000 04751.101017 1 81510000002990",
        "barCode": null
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

