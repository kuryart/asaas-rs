info:
  name: Listar parcelamentos
  type: http
  seq: 2
  tags:
    - Parcelamentos

http:
  method: GET
  url: "{{baseUrl}}/v3/installments"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

