info:
  name: Criar uma autorização
  type: http
  seq: 1
  tags:
    - Pix Automático

http:
  method: POST
  url: "{{baseUrl}}/v3/pix/automatic/authorizations"
  body:
    type: json
    data: |-
      {
        "frequency": "MONTHLY",
        "contractId": "CONTRACT-123",
        "startDate": "2024-01-01",
        "finishDate": "2024-12-31",
        "value": 100,
        "description": "Serviços de Streaming de Música e Filmes",
        "customerId": "cus_000005735721",
        "immediateQrCode": {
          "pixKey": "b6295ee1-f054-47d1-9e90-ee57b74f60d9",
          "expirationSeconds": 3600,
          "originalValue": 100,
          "description": "Taxa de criação de conta"
        },
        "minLimitValue": 50,
        "paymentCreationMode": "MANUAL",
        "retryPolicy": "ALLOW_THREE_IN_SEVEN_DAYS"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

