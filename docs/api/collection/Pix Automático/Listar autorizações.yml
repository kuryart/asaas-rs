info:
  name: Listar autorizações
  type: http
  seq: 2
  tags:
    - Pix Automático

http:
  method: GET
  url: "{{baseUrl}}/v3/pix/automatic/authorizations"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: status
      value: CREATED
      type: query
      description: Filtrar pelo status atual da autorização
      disabled: true
    - name: status
      value: ACTIVE
      type: query
      description: Filtrar pelo status atual da autorização
      disabled: true
    - name: status
      value: CANCELLED
      type: query
      description: Filtrar pelo status atual da autorização
      disabled: true
    - name: status
      value: REFUSED
      type: query
      description: Filtrar pelo status atual da autorização
      disabled: true
    - name: status
      value: EXPIRED
      type: query
      description: Filtrar pelo status atual da autorização
      disabled: true
    - name: customerId
      value: cus_000005735721
      type: query
      description: Filtrar pelo identificador único do cliente
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

