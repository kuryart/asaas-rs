info:
  name: Recuperar uma única autorização
  type: http
  seq: 3
  tags:
    - Pix Automático

http:
  method: GET
  url: "{{baseUrl}}/v3/pix/automatic/authorizations/:id"
  params:
    - name: id
      value: a33047b1-fb19-4b68-9373-a7ba8a8162aa
      type: path
      description: Identificador único da autorização de Pix Automático no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

