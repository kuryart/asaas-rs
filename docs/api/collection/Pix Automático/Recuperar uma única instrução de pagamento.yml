info:
  name: Recuperar uma única instrução de pagamento
  type: http
  seq: 5
  tags:
    - Pix Automático

http:
  method: GET
  url: "{{baseUrl}}/v3/pix/automatic/paymentInstructions/:id"
  params:
    - name: id
      value: cbfdf6ef-9bd8-48ba-b8cd-efd61a9f614c
      type: path
      description: Identificador único da instrução de pagamento de Pix Automático no Asaas
  auth: inherit

settings:
