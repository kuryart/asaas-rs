info:
  name: Listar itens de uma recorrência
  type: http
  seq: 4
  tags:
    - Pix Recorrente

http:
  method: GET
  url: "{{baseUrl}}/v3/pix/transactions/recurrings/:id/items"
  params:
    - name: id
      value: 35363f6e-93e2-11ec-b9d9-96f4053b1bd4
      type: path
      description: Identificador único da recorrência no Asaas
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/pix/transactions/recurrings/:id/items"
      method: GET
      params:
        - name: id
          value: 35363f6e-93e2-11ec-b9d9-96f4053b1bd4
          type: path
          description: Identificador único da recorrência no Asaas
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
              {
                "id": "71ae9d73-468f-4d04-8b87-a541128f9c46",
                "status": "PENDING",
                "scheduledDate": "2024-10-23",
                "canBeCancelled": true,
                "recurrenceNumber": 1,
                "quantity": 2,
                "value": 0.02,
                "refusalReasonDescription": null,
                "externalAccount": {
                  "name": "John Doe",
                  "financialInstitutionName": "Banco exemplo S.A",
                  "cpfCnpj": "***.456.789-**",
                  "pixKey": "***.456.789-**"
                }
              }
            ]
          }
