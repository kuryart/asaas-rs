info:
  name: Listar recorrências
  type: http
  seq: 1
  tags:
    - Pix Recorrente

http:
  method: GET
  url: "{{baseUrl}}/v3/pix/transactions/recurrings"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: status
      value: AWAITING_CRITICAL_ACTION_AUTHORIZATION
      type: query
      description: Filtrar pelo status da recorrência
      disabled: true
    - name: status
      value: PENDING
      type: query
      description: Filtrar pelo status da recorrência
      disabled: true
    - name: status
      value: SCHEDULED
      type: query
      description: Filtrar pelo status da recorrência
      disabled: true
    - name: status
      value: CANCELLED
      type: query
      description: Filtrar pelo status da recorrência
      disabled: true
    - name: status
      value: DONE
      type: query
      description: Filtrar pelo status da recorrência
      disabled: true
    - name: value
      value: "100"
      type: query
      description: Filtrar pelo valor da recorrência
    - name: searchText
      value: "null"
      type: query
      description: Filtrar pelo nome do recebedor
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

