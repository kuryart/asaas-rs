info:
  name: Recuperar uma única recorrência
  type: http
  seq: 2
  tags:
    - Pix Recorrente

http:
  method: GET
  url: "{{baseUrl}}/v3/pix/transactions/recurrings/:id"
  params:
    - name: id
      value: 35363f6e-93e2-11ec-b9d9-96f4053b1bd4
      type: path
      description: Identificador único da recorrência no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/pix/transactions/recurrings/:id"
      method: GET
      params:
        - name: id
          value: 35363f6e-93e2-11ec-b9d9-96f4053b1bd4
          type: path
          description: Identificador único da recorrência no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "35363f6e-93e2-11ec-b9d9-96f4053b1bd4",
            "status": "PENDING",
            "origin": "PIX",
            "value": 0.02,
            "frequency": "WEEKLY",
            "quantity": 2,
            "startDate": "2024-09-18",
            "finishDate": "2024-09-25",
            "canBeCancelled": true,
            "externalAccount": {
              "name": "John Doe",
              "financialInstitutionName": "Banco exemplo S.A",
              "cpfCnpj": "***.456.789-**",
              "pixKey": "***.456.789-**"
            }
          }
