info:
  name: Deletar QR Code estático
  type: http
  seq: 6
  tags:
    - Pix

http:
  method: DELETE
  url: "{{baseUrl}}/v3/pix/qrCodes/static/:id"
  params:
    - name: id
      value: ASAAS00000000000000383ASA
      type: path
      description: Identificador do QR Code que será removido.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

