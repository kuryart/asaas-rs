info:
  name: Buscar qual provedor o número pertence e os valores disponíveis para recarga
  type: http
  seq: 5
  tags:
    - Recargas de celular

http:
  method: GET
  url: "{{baseUrl}}/v3/mobilePhoneRecharges/:phoneNumber/provider"
  params:
    - name: phoneNumber
      value: "63997365512"
      type: path
      description: Número do celular que será consultado.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges/:phoneNumber/provider"
      method: GET
      params:
        - name: phoneNumber
          value: "63997365512"
          type: path
          description: Número do celular que será consultado.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "name": "Vivo",
            "values": [
              {
                "name": "R$ 12,00",
                "bonus": "5.0",
                "minValue": 1,
                "maxValue": 5
              },
              {
                "name": "R$ 30,00",
                "bonus": "3.0",
                "minValue": 20,
                "maxValue": 50
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges/:phoneNumber/provider"
      method: GET
      params:
        - name: phoneNumber
          value: "63997365512"
          type: path
          description: Número do celular que será consultado.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges/:phoneNumber/provider"
      method: GET
      params:
        - name: phoneNumber
          value: "63997365512"
          type: path
          description: Número do celular que será consultado.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges/:phoneNumber/provider"
      method: GET
      params:
        - name: phoneNumber
          value: "63997365512"
          type: path
          description: Número do celular que será consultado.
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges/:phoneNumber/provider"
      method: GET
      params:
        - name: phoneNumber
          value: "63997365512"
          type: path
          description: Número do celular que será consultado.
    response:
