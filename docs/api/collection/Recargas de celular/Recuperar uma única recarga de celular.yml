  url: "{{baseUrl}}/v3/mobilePhoneRecharges/:id"
  params:
    - name: id
      value: 37c22147-4194-11ec-8061-0242ac120002
      type: path
      description: Identificador único da recarga de celular no Asaas
  auth: inherit

settings:
