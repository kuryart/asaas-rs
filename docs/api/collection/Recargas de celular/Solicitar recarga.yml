info:
  name: Solicitar recarga
  type: http
  seq: 1
  tags:
    - Recargas de celular

http:
  method: POST
  url: "{{baseUrl}}/v3/mobilePhoneRecharges"
  body:
    type: json
    data: |-
      {
        "value": 15,
        "phoneNumber": "63997365512"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges"
      method: POST
      body:
        type: json
        data: |-
          {
            "value": 15,
            "phoneNumber": "63997365512"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "37c22147-4194-11ec-8061-0242ac120002",
            "value": 15,
            "phoneNumber": "63997365512",
            "status": "PENDING",
            "canBeCancelled": null,
            "operatorName": "Vivo"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges"
      method: POST
      body:
        type: json
        data: |-
          {
            "value": 15,
            "phoneNumber": "63997365512"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/mobilePhoneRecharges"
      method: POST
      body:
        type: json
        data: |-
          {
            "value": 15,
            "phoneNumber": "63997365512"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
