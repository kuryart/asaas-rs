info:
  name: Recuperar efeitos de contrato que estão bloqueando a antecipação de uma cobrança
  type: http
  seq: 1
  tags:
    - Registro de Recebíveis

http:
  method: GET
  url: "{{baseUrl}}/v3/payments/:id/contractualEffectRestrictions"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único da cobrança
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/payments/:id/contractualEffectRestrictions"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único da cobrança
        - name: offset
          value: "0"
          type: query
          description: Elemento inicial da lista
        - name: limit
          value: "10"
          type: query
          description: "Número de elementos da lista (max: 100)"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "object": "list",
            "hasMore": false,
            "totalCount": 2,
            "limit": 10,
            "offset": 0,
            "data": [
              {
                "beneficiaryCpfCnpj": null,
                "externalIdentifier": null
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
