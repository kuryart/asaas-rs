      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: paymentId
      value: "null"
      type: query
      description: Filtrar pelo ID da cobrança
    - name: status
      value: PENDING
      type: query
      description: Filtrar por status
      disabled: true
    - name: status
      value: PROCESSING
      type: query
      description: Filtrar por status
      disabled: true
