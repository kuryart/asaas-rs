      type: query
      description: Filtrar por status
      disabled: true
    - name: status
      value: DONE
      type: query
      description: Filtrar por status
      disabled: true
    - name: status
      value: REFUNDED
      type: query
      description: Filtrar por status
      disabled: true
    - name: status
      value: BLOCKED_BY_VALUE_DIVERGENCE
      type: query
      description: Filtrar por status
      disabled: true
    - name: paymentConfirmedDate[ge]
      value: "null"
      type: query
      description: Filtrar a partir da data de confirmação da cobrança inicial
    - name: paymentConfirmedDate[le]
      value: "null"
      type: query
      description: Filtrar a partir da data de confirmação da cobrança final
    - name: creditDate[ge]
      value: "null"
      type: query
      description: Filtrar a partir da data de recebimento do split inicial
    - name: creditDate[le]
      value: "null"
      type: query
      description: Filtrar a partir da data de recebimento do split final
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

