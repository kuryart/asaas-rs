info:
  name: Recuperar um único split recebido
  type: http
  seq: 3
  tags:
    - Splits

http:
  method: GET
  url: "{{baseUrl}}/v3/payments/splits/received/:id"
  params:
    - name: id
      value: "null"
      type: path
      description: Identificador único do split pago no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/payments/splits/received/:id"
      method: GET
      params:
        - name: id
          value: "null"
          type: path
          description: Identificador único do split pago no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "fd41396a-7453-47d0-9411-c8543522591d",
            "walletId": "7bafd95a-e783-4a62-9be1-23999af742c6",
            "fixedValue": 20.32,
            "percentualValue": null,
            "totalValue": 20.32,
