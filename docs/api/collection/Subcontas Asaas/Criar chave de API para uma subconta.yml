info:
  name: Criar chave de API para uma subconta
  type: http
  seq: 6
  tags:
    - Subcontas Asaas

http:
  method: POST
  url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
  params:
    - name: id
      value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
      type: path
      description: Identificador único da subconta no Asaas
  body:
    type: json
    data: |-
      {
        "name": "My API Access Token",
        "expirationDate": "2026-12-31 12:30:50"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: POST
      params:
        - name: id
          value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
          type: path
          description: Identificador único da subconta no Asaas
      body:
        type: json
        data: |-
          {
            "name": "My API Access Token",
            "expirationDate": "2026-12-31 12:30:50"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "b6bff0c5-38c6-496a-a3a8-105b31d5bcfe",
            "name": "My API Access Token",
            "enabled": false,
            "disabledReason": "MANUAL",
            "expirationDate": "2026-12-31 12:30:50",
            "dateCreated": "2026-01-01 08:00:00",
            "projectedExpirationDateByLackOfUse": "2026-06-01",
            "apiKey": "$aact_hmlg_xxxxx"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: POST
      params:
        - name: id
          value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
