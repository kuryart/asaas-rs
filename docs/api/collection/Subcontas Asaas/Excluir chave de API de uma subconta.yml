info:
  name: Excluir chave de API de uma subconta
  type: http
  seq: 9
  tags:
    - Subcontas Asaas

http:
  method: DELETE
  url: "{{baseUrl}}/v3/accounts/:id/accessTokens/:accessTokenId"
  params:
    - name: id
      value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
      type: path
      description: Identificador único da subconta no Asaas
    - name: accessTokenId
      value: 279baa3b-2cfd-4d41-b04b-e3299ae4b645
      type: path
      description: ID da chave de API
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: No Content
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens/:accessTokenId"
      method: DELETE
      params:
        - name: id
          value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
          type: path
          description: Identificador único da subconta no Asaas
        - name: accessTokenId
          value: 279baa3b-2cfd-4d41-b04b-e3299ae4b645
          type: path
          description: ID da chave de API
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens/:accessTokenId"
      method: DELETE
      params:
        - name: id
          value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
          type: path
          description: Identificador único da subconta no Asaas
        - name: accessTokenId
          value: 279baa3b-2cfd-4d41-b04b-e3299ae4b645
          type: path
          description: ID da chave de API
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens/:accessTokenId"
      method: DELETE
      params:
        - name: id
          value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
          type: path
          description: Identificador único da subconta no Asaas
        - name: accessTokenId
          value: 279baa3b-2cfd-4d41-b04b-e3299ae4b645
          type: path
          description: ID da chave de API
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens/:accessTokenId"
      method: DELETE
      params:
        - name: id
          value: b6bff0c5-38c6-496a-a3a8-105b31d5bcfe
          type: path
          description: Identificador único da subconta no Asaas
        - name: accessTokenId
          value: 279baa3b-2cfd-4d41-b04b-e3299ae4b645
          type: path
          description: ID da chave de API
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
