info:
  name: Listar chaves de API de uma subconta
  type: http
  seq: 7
  tags:
    - Subcontas Asaas

http:
  method: GET
  url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
  params:
    - name: id
      value: 4f468235-cec3-482f-b3d0-348af4c7194
      type: path
      description: Identificador único da subconta no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ok
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "accessTokens": [
              {
                "id": "b6bff0c5-38c6-496a-a3a8-105b31d5bcfe",
                "name": "My API Access Token",
                "enabled": false,
                "disabledReason": "MANUAL",
                "expirationDate": "2026-12-31 12:30:50",
                "dateCreated": "2026-01-01 08:00:00",
                "projectedExpirationDateByLackOfUse": "2026-06-01"
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "error_code",
                "description": "Descrição do erro"
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "code": "invalid_access_token",
                "description": "A chave de API fornecida é inválida"
              }
            ]
          }
  - name: 403 Response
    description: Forbidden. Ocorre quando o body da requisição está preenchido, chamadas de método GET precisam ter um body vazio.
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/v3/accounts/:id/accessTokens"
      method: GET
      params:
        - name: id
          value: 4f468235-cec3-482f-b3d0-348af4c7194
          type: path
          description: Identificador único da subconta no Asaas
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
