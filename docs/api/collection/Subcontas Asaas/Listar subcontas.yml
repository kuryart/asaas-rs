info:
  name: Listar subcontas
  type: http
  seq: 2
  tags:
    - Subcontas Asaas

http:
  method: GET
  url: "{{baseUrl}}/v3/accounts"
  params:
    - name: offset
      value: "0"
      type: query
      description: Elemento inicial da lista
    - name: limit
      value: "10"
      type: query
      description: "Número de elementos da lista (max: 100)"
    - name: cpfCnpj
      value: "null"
      type: query
      description: Filtrar pelo cpf ou cnpj da subconta
    - name: email
      value: "null"
      type: query
      description: Filtrar pelo email da subconta
    - name: name
      value: "null"
      type: query
      description: Filtrar pelo nome da subconta
    - name: walletId
      value: "null"
      type: query
      description: Filtrar pelo walletId da subconta
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

