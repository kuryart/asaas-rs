info:
  name: Recuperar uma única subconta
  type: http
  seq: 3
  tags:
    - Subcontas Asaas

http:
  method: GET
  url: "{{baseUrl}}/v3/accounts/:id"
  params:
    - name: id
      value: 4f468235-cec3-482f-b3d0-348af4c7194
      type: path
      description: Identificador único da subconta no Asaas
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
