          description: Identificador único da subconta no Asaas
      body:
        type: json
        data: "{}"
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""

docs: Reenvia o link de redefinição de senha da subconta não-BaaS. Este reenvio pode ser feito apenas uma vez e tem o intuito de recuperar o acesso pelo e-mail cadastrado no login da subconta.
