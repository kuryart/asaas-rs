info:
  name: Decodificar um QRCode para pagamento
  type: http
  seq: 2
  tags:
    - Transações Pix

http:
  method: POST
  url: "{{baseUrl}}/v3/pix/qrCodes/decode"
  body:
    type: json
    data: |-
      {
        "payload": "00020101021226730014br.gov.bcb.pix2551pix-h.asaas.com/pixqrcode/cobv/pay_76575613967995145204000053039865802BR5905ASAAS6009Joinville61088922827162070503***63045E7A",
        "changeValue": null,
        "expectedPaymentDate": "2026-01-01"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

