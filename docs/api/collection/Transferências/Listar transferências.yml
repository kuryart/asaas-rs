info:
  name: Listar transferências
  type: http
  seq: 2
  tags:
    - Transferências

http:
  method: GET
  url: "{{baseUrl}}/v3/transfers"
  params:
    - name: dateCreated[ge]
      value: "null"
      type: query
      description: Filtrar pela data de criação inicial
    - name: dateCreated[le]
      value: "null"
      type: query
      description: Filtrar pela data de criação final
    - name: transferDate[ge]
      value: "null"
      type: query
      description: Filtrar pela data inicial de efetivação de transferência
    - name: transferDate[le]
      value: "null"
      type: query
      description: Filtrar pela data final de efetivação de transferência
    - name: type
      value: ASAAS_ACCOUNT
      type: query
      description: Filtrar por tipo da transferência
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

