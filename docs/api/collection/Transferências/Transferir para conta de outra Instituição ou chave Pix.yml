info:
  name: Transferir para conta de outra Instituição ou chave Pix
  type: http
  seq: 1
  tags:
    - Transferências

http:
  method: POST
  url: "{{baseUrl}}/v3/transfers"
  body:
    type: json
    data: |-
      {
        "value": 1000,
        "bankAccount": {
          "bank": {
            "code": "237"
          },
          "accountName": "Conta do Bradesco",
          "ownerName": "John Doe",
          "ownerBirthDate": "1995-04-12",
          "cpfCnpj": "52233424611",
          "agency": "1263",
          "account": "9999991",
          "accountDigit": "1",
          "bankAccountType": "CONTA_CORRENTE",
          "ispb": "60746948"
        },
        "operationType": "PIX",
        "pixAddressKey": null,
        "pixAddressKeyType": "EVP",
        "description": "Churrasco pago via Pix agendado",
        "scheduleDate": "2018-01-26",
        "externalReference": null,
        "recurring": {
          "frequency": "MONTHLY",
          "quantity": 3
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

